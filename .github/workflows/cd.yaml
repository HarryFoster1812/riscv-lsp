name: Deploy to VS Code Marketplace

# Only trigger when you push a tag like "v1.0.1"
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Compile TypeScript
      run: npm run compile

    # THE GATEKEEPER: If this fails, the deployment completely stops here.
    - name: Run Jest Tests
      run: npm run test

    # Package and Publish using the official VS Code CLI tool
    - name: Publish to Marketplace
      run: npx @vscode/vsce publish
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}